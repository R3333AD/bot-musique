server:
  port: 2333
  address: 0.0.0.0

lavalink:
  server:
    password: "youshallnotpass"
    bufferDurationMs: 400
    sources:
      youtube: false
      soundcloud: true
      bandcamp: false
      twitch: false
      http: false
      local: false
  plugins:
    - dependency: "dev.lavalink.youtube:youtube-plugin:1.18.1"
      repository: "https://maven.lavalink.dev/releases"
    - dependency: "com.github.topi314.lavasrc:lavasrc-plugin:4.8.3"
      repository: "https://maven.lavalink.dev/releases"

plugins:
  lavasrc:
    providers:
      - "ytsearch:\"%ISRC%\""
      - "ytsearch:%QUERY%"
    # Non utilisé : ton code résout les liens Spotify par scraping des pages
    # publiques (utils/music.py: _spotify_url_to_query / _spotify_collection_tracks),
    # pas via l'API officielle. Ces credentials ne servent donc à rien tant que
    # tu n'actives pas explicitement wavelink.Playable.search("spotify:...").
    # Laisse "spotify: false" pour éviter d'exposer un Client ID/Secret pour rien.
    spotify:
      clientId: ""
      clientSecret: ""
      countryCode: "FR"
    sources:
      spotify: false
    soundcloud:
      enabled: true
